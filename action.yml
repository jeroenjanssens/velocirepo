name: velocirepo
description: Track your open-source project's pulse across package registries, GitHub, and the web
branding:
  icon: bar-chart
  color: green

inputs:
  github-token:
    description: GitHub token for API access
    required: false
    default: ${{ github.token }}
  plausible-token:
    description: Plausible Analytics API token
    required: false
  youtube-token:
    description: YouTube Data API token
    required: false
  version:
    description: "velocirepo version to install (default: latest)"
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install velocirepo
      shell: bash
      env:
        VELOCIREPO_VERSION_INPUT: ${{ inputs.version }}
      run: |
        set -euo pipefail

        if [ "$VELOCIREPO_VERSION_INPUT" = "latest" ]; then
          VERSION=$(curl -sSL -o /dev/null -w '%{url_effective}' https://github.com/jeroenjanssens/velocirepo/releases/latest | grep -o '[^/]*$' | sed 's/^v//')
        else
          if [[ ! "$VELOCIREPO_VERSION_INPUT" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid velocirepo version. Use 'latest' or a semantic version like v1.2.3." >&2
            exit 1
          fi
          VERSION="${VELOCIREPO_VERSION_INPUT#v}"
        fi
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Could not resolve a valid velocirepo version." >&2
          exit 1
        fi
        URL="https://github.com/jeroenjanssens/velocirepo/releases/download/v${VERSION}/velocirepo_${VERSION}_linux_amd64.tar.gz"
        curl -sSL "$URL" | tar xz -C /usr/local/bin velocirepo

    - name: Print version
      shell: bash
      run: velocirepo version

    - name: Fetch all sources
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLAUSIBLE_TOKEN: ${{ inputs.plausible-token }}
        YOUTUBE_TOKEN: ${{ inputs.youtube-token }}
      run: velocirepo fetch
